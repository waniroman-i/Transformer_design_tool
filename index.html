<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Engineering Central Hub</title>
  <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0e14;
      --panel: #111720;
      --border: #1e2d3d;
      --accent: #00d4ff;
      --text: #cdd9e5;
      --muted: #4a6070;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Barlow', sans-serif;
      min-height: 100vh;
    }
    
    /* Global Navigation */
    nav {
      background: var(--panel);
      border-bottom: 1px solid var(--border);
      padding: 15px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    nav a {
      color: var(--text);
      text-decoration: none;
      font-weight: 600;
      letter-spacing: 0.05em;
    }
    nav .brand { color: var(--accent); font-size: 18px; }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 40px 24px;
    }

    /* Tool Grid Home Dashboard */
    .dashboard-title {
      margin-bottom: 30px;
      font-size: 28px;
    }
    .tools-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 20px;
    }
    .tool-card {
      background: var(--panel);
      border: 1px solid var(--border);
      padding: 24px;
      border-radius: 4px;
      cursor: pointer;
      transition: all 0.2s ease;
    }
    .tool-card:hover {
      border-color: var(--accent);
      transform: translateY(-2px);
    }
    .tool-card h3 { color: var(--accent); margin-bottom: 8px; font-size: 18px; }
    .tool-card p { color: var(--muted); font-size: 14px; line-height: 1.4; }

    /* Hidden states for routing */
    .view-section { display: none; }
    .view-section.active { display: block; }
    
    /* Dynamic Frame injection overrides */
    #tool-renderer-box {
      width: 100%;
      min-height: 80vh;
      border: none;
      background: transparent;
    }
  </style>
</head>
<body>

  <nav>
    <a href="#" class="brand" onclick="navigateToHome(event)">⚡ Central Hub</a>
    <a href="#" onclick="navigateToHome(event)">← Back to Tools</a>
  </nav>

  <div class="container">
    
    <section id="dashboard-view" class="view-section active">
      <h2 class="dashboard-title">Available Tools & Calculators</h2>
      <div class="tools-grid">
        
        <div class="tool-card" onclick="loadTool('transformer-calc.html')">
          <h3>Transformer Designer</h3>
          <p>Ferrite core, SWG wire selection, and window space factor optimization calculations.</p>
        </div>

        <div class="tool-card" onclick="loadTool('litz_wire_calculator.html')">
          <h3>Litz wire tool</h3>
          <p>Lookup electrical properties, dimension sizes, and cross-reference core standards.</p>
        </div>

      </div>
    </section>

    <section id="tool-view" class="view-section">
      <iframe id="tool-renderer-box" title="Tool Engine"></iframe>
    </section>

  </div>

  <script>
    function loadTool(htmlFileName) {
      // Hide home screen dashboard
      document.getElementById('dashboard-view').classList.remove('active');
      
      // Setup and reveal our iframe view port
      const toolView = document.getElementById('tool-view');
      const frame = document.getElementById('tool-renderer-box');
      
      // Inject file dynamically straight out of the repo path structure
      frame.src = htmlFileName;
      toolView.classList.add('active');
      
      // Update browser history state URL clean
      history.pushState({page: htmlFileName}, '', '#' + htmlFileName.split('.')[0]);
    }

    function navigateToHome(event) {
      if(event) event.preventDefault();
      document.getElementById('tool-view').classList.remove('active');
      document.getElementById('dashboard-view').classList.add('active');
      document.getElementById('tool-renderer-box').src = "";
      history.pushState({page: 'home'}, '', window.location.pathname);
    }

    // Handle back button clicks inside the web browser smoothly
    window.onpopstate = function(event) {
      if(event.state && event.state.page && event.state.page !== 'home') {
        loadTool(event.state.page);
      } else {
        navigateToHome();
      }
    };
  </script>
</body>
</html>
